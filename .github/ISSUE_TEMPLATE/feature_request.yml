name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. For provider boundaries, see [`catalog/capabilities.v1.json`](https://github.com/counterfactual5/Claude-Science-Proxy/blob/main/catalog/capabilities.v1.json) and [`docs/DEVELOPMENT.md`](https://github.com/counterfactual5/Claude-Science-Proxy/blob/main/docs/DEVELOPMENT.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? Why is the current behavior insufficient?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
