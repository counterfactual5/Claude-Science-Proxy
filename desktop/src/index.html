<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSSwitch</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="panel">
      <div class="hd" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>CSSwitch</div>
      </div>

      <div class="panel-body list-only">
        <div class="sec" id="listSec">
          <div class="listhd">
            <label>我的配置</label>
            <button class="btn small" id="newBtn">＋ 新建</button>
          </div>
          <div id="profileList"></div>
          <button class="btn small" id="skipActivateBtn" hidden style="margin-top:8px;width:100%">校验没过，仍要启用这条</button>
        </div>

        <details class="sec adv" id="advSec">
          <summary>高级设置</summary>
          <div class="ports">
            <div class="fld"><label for="proxyPort">代理端口</label><input id="proxyPort" inputmode="numeric" value="18991" /></div>
            <div class="fld"><label for="sandboxPort">沙箱端口</label><input id="sandboxPort" inputmode="numeric" value="8990" /></div>
          </div>
        </details>
      </div>

      <!-- 新建向导：选模板 → 预填 → 填 key → 创建（不自动生效） -->
      <div class="sec" id="wizSec" hidden>
        <label id="wizTplLabel">选择来源</label>
        <div id="wizTemplateChips" class="chips" role="group" aria-labelledby="wizTplLabel"></div>
        <input id="wizTemplate" type="hidden" />
        <div class="hint" id="wizTplHint"></div>
        <label style="margin-top:10px" for="wizName">名称</label>
        <input id="wizName" type="text" placeholder="给这套配置起个名字" autocomplete="off" spellcheck="false" />
        <label style="margin-top:10px" for="wizBase">地址 base_url</label>
        <div class="row">
          <input id="wizBase" type="text" placeholder="https://your-relay/claude" autocomplete="off" spellcheck="false" />
          <button class="btn small" id="wizFetchBtn">获取模型</button>
        </div>
        <div class="hint" id="wizBaseHint"></div>
        <label style="margin-top:10px" for="wizKey">API Key / Token</label>
        <input id="wizKey" type="password" placeholder="粘贴 key（只存本地）" autocomplete="off" spellcheck="false" />
        <div class="hint">只存本地，不上传给 CSSwitch；使用时才作为鉴权发给你选的服务商。</div>
        <label style="margin-top:10px" id="wizModelLabel">模型</label>
        <div id="wizModelInfo" class="modelinfo" hidden></div>
        <input id="wizModel" list="wizModelList" aria-labelledby="wizModelLabel" autocomplete="off" spellcheck="false" />
        <datalist id="wizModelList"></datalist>
        <div id="wizModelPick" class="model-pick" hidden></div>
        <div class="hint" id="wizModelHint"></div>
        <div class="row" style="margin-top:12px">
          <button class="btn small" id="wizSaveBtn">创建</button>
          <button class="btn small" id="wizCancelBtn">取消</button>
        </div>
        </div>

        <!-- 连接编辑（名称/base_url/model/key） -->
        <div class="sec" id="connSec" hidden>
        <label id="connTitle">编辑</label>
        <label style="margin-top:6px" for="connName">名称</label>
        <input id="connName" type="text" autocomplete="off" spellcheck="false" />
        <label style="margin-top:10px" for="connBase">地址 base_url</label>
        <div class="row">
          <input id="connBase" type="text" autocomplete="off" spellcheck="false" />
          <button class="btn small" id="connFetchBtn">获取模型</button>
        </div>
        <div class="hint" id="connBaseHint"></div>
        <label style="margin-top:10px" for="connKey">API Key / Token</label>
        <input id="connKey" type="password" autocomplete="off" spellcheck="false" />
        <div class="hint">留空＝不改 key。</div>
        <label style="margin-top:10px" id="connModelLabel">模型</label>
        <div id="connModelInfo" class="modelinfo" hidden></div>
        <input id="connModel" list="connModelList" aria-labelledby="connModelLabel" autocomplete="off" spellcheck="false" />
        <datalist id="connModelList"></datalist>
        <div id="connModelPick" class="model-pick" hidden></div>
        <div class="hint" id="connModelHint"></div>
        <div class="row" style="margin-top:12px">
          <button class="btn small" id="connSaveBtn">保存</button>
          <button class="btn small" id="connCancelBtn">取消</button>
        </div>
      </div>

      <!-- 反馈消息：有真实反馈（表单错误 / 回滚 / 保存结果 / 自检）才显示，空闲不占位。 -->
      <div class="sec feedback" hidden>
        <div class="msg" id="msg" role="status" aria-live="polite"></div>
      </div>
      </div>

      <!-- 运行控制区：仅列表视图显示（表单视图由 .view-form 隐藏）。 -->
      <div class="sec list-only run-sec">
        <button class="hero" id="oneClickBtn">启动 Claude Science</button>
        <div class="subbtns">
          <button class="btn" id="stopBtn" title="停止本地代理与 Science 沙箱">停止</button>
        </div>
      </div>
    </div>
  </body>
</html>
