<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Science Proxy</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="panel">
      <div class="hd" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="brand-mark" aria-hidden="true" title="Claude Science Proxy">CSP</span>
        </div>
      </div>

      <div class="panel-body">
        <div class="sec list-sec list-only" id="listSec">
          <div class="listhd">
            <label class="sec-title" id="i18nMyConfigs">我的配置</label>
            <div class="listhd-acts">
              <div class="listhd-acts-cluster">
                <button class="btn small" id="newBtn">＋ 新建</button>
                <div class="listhd-more">
                  <button type="button" class="btn small listhd-more-btn" id="listhdMoreBtn" aria-haspopup="true" aria-expanded="false" title="更多">⋯</button>
                  <div class="pmenu listhd-menu" id="listhdMenu" hidden role="menu">
                    <button type="button" class="pmenu-item" id="editCspJsonBtn" role="menuitem">Edit CSP.json</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="profileList"></div>
          <button class="btn small" id="skipActivateBtn" hidden style="margin-top:8px;width:100%">校验没过，仍要启用这条</button>
        </div>

        <div class="sec" id="wizSec" hidden>
          <label for="wizName" id="i18nLabelProvider">Provider</label>
          <div class="provider-row">
            <input id="wizName" type="text" placeholder="DeepSeek" autocomplete="off" spellcheck="false" />
            <select id="wizPreset" class="provider-preset" title="快速填入名称与地址"></select>
          </div>
          <label style="margin-top:10px" for="wizBase" id="i18nLabelBase">Base_URL</label>
          <input id="wizBase" type="text" placeholder="https://api.example.com/v1" autocomplete="off" spellcheck="false" />
          <label style="margin-top:10px" for="wizKey" id="i18nLabelKey">API Key</label>
          <input id="wizKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
          <div class="row" style="margin-top:12px">
            <button class="btn small" id="wizSaveBtn">创建</button>
            <button class="btn small" id="wizCancelBtn">取消</button>
          </div>
        </div>

        <div class="sec" id="connSec" hidden>
          <label id="connTitle">编辑</label>
          <label style="margin-top:6px" for="connName" id="i18nConnName">Provider</label>
          <input id="connName" type="text" autocomplete="off" spellcheck="false" />
          <label style="margin-top:10px" for="connBase" id="i18nConnBase">Base_URL</label>
          <input id="connBase" type="text" autocomplete="off" spellcheck="false" />
          <div class="hint" id="connBaseHint"></div>
          <label style="margin-top:10px" for="connKey" id="i18nConnKey">API Key</label>
          <input id="connKey" type="password" autocomplete="off" spellcheck="false" />
          <label style="margin-top:10px" id="connModelLabel">启用模型</label>
          <div id="connModelInfo" class="modelinfo" hidden></div>
          <div id="connModelPick" class="model-pick" hidden></div>
          <div class="hint" id="connModelHint"></div>
          <div class="row" style="margin-top:12px">
            <button class="btn small" id="connSaveBtn">保存</button>
            <button class="btn small" id="connCancelBtn">取消</button>
          </div>
        </div>

        <div class="sec feedback" hidden>
          <div class="msg" id="msg" role="status" aria-live="polite"></div>
        </div>
      </div>

      <div class="panel-foot list-only">
        <div class="sec ports-sec list-only" id="advSec">
          <label class="sec-title" id="i18nPorts">端口管理</label>
          <div class="ports">
            <div class="fld"><label for="proxyPort" id="i18nProxyPort">代理</label><input id="proxyPort" inputmode="numeric" value="18991" /></div>
            <div class="fld"><label for="sandboxPort" id="i18nSandboxPort">沙箱</label><input id="sandboxPort" inputmode="numeric" value="8990" /></div>
          </div>
        </div>

        <div class="sec run-sec">
          <button class="hero" id="oneClickBtn">启动 Claude Science</button>
          <div class="subbtns">
            <button class="btn" id="stopBtn" title="停止本地代理与 Science 沙箱">停止</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
