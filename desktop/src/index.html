<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSSwitch</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="panel">
      <div class="hd" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region><span id="brandDot" class="dot amber"></span>CSSwitch</div>
        <div class="gear" id="quitBtn" title="退出 CSSwitch">退出</div>
      </div>

      <div class="sec modeseg">
        <div class="seg" id="modeSeg">
          <button type="button" class="seg-btn active" data-mode="proxy">第三方模型</button>
          <button type="button" class="seg-btn" data-mode="official">官方 Claude</button>
        </div>
      </div>

      <div class="sec official-only">
        <div class="hint">官方模式：用你自己真实的 Claude Science 与订阅。CSSwitch 不插手你的官方登录、也不起代理/沙箱，只把你交回官方客户端。</div>
      </div>

      <div class="sec tp-only">
        <label>模型 / Provider</label>
        <select id="provider">
          <option value="deepseek">DeepSeek（原生 Anthropic 端点）</option>
          <option value="qwen">通义千问 Qwen（DashScope 翻译）</option>
        </select>
      </div>

      <div class="sec tp-only">
        <label id="keyLabel">DeepSeek API Key</label>
        <div class="row">
          <input id="keyInput" type="password" placeholder="粘贴第三方 key（只存本地）" autocomplete="off" spellcheck="false" />
          <button class="btn small" id="saveKeyBtn">保存</button>
        </div>
        <div class="hint">存本地 <code>~/.csswitch/config.json</code>（0600）；面板只回显末 4 位。</div>
      </div>

      <details class="sec adv tp-only">
        <summary>高级设置</summary>
        <div class="ports">
          <div class="fld"><label>代理端口</label><input id="proxyPort" inputmode="numeric" value="18991" /></div>
          <div class="fld"><label>沙箱端口</label><input id="sandboxPort" inputmode="numeric" value="8990" /></div>
        </div>
      </details>

      <div class="sec">
        <button class="hero" id="oneClickBtn">⚡ 一键开始</button>
        <div class="subbtns">
          <button class="btn" id="stopBtn">全部停止</button>
        </div>
      </div>

      <div class="sec">
        <div class="status tp-only">
          <div class="st"><span id="ltProxy" class="lt a"></span>代理</div>
          <div class="st"><span id="ltSandbox" class="lt a"></span>沙箱</div>
          <div class="st"><span id="ltUpstream" class="lt a"></span>上游</div>
        </div>
        <div class="msg" id="msg">就绪。</div>
      </div>

      <div class="foot">
        <span class="link" id="openBrowserBtn">打开浏览器面板 ↗</span>
        <span class="link" id="reportBtn">反馈 / 报 bug</span>
      </div>
      <div class="foot foot2">
        <span><span class="link" id="doctorBtn">自检</span> · <span class="link" id="logsBtn">日志</span></span>
        <span><span class="link" id="updateBtn">检查更新</span> · <span id="verLabel"></span></span>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
